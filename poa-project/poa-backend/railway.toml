[build]
  builder = "nixpacks"
  buildCommand = "pip install --no-cache-dir -r requirements.txt"

[deploy]
  startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[nixpacks]
  providers = ["python"]
  packages = ["ffmpeg"]

[nixpacks.python]
  pythonVersion = "3.11"

[service]
name = "poa-backend"

[service.volume]
name = "data"
mountPath = "/data"
